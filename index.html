<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #111827;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            max-width: 512px;
            width: 100%;
            background-color: #1f2937;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .score-item {
            flex: 1;
            text-align: center;
        }
        .score-label {
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .score-value {
            font-size: 28px;
            font-weight: bold;
        }
        .score-current { color: #22c55e; }
        .score-high { color: #facc15; }
        .game-container {
            position: relative;
            margin-bottom: 16px;
            border-radius: 16px;
            overflow: hidden;
            background-color: #111827;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            touch-action: none;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(17, 24, 39, 0.9);
            border-radius: 16px;
        }
        .overlay-content {
            text-align: center;
        }
        .overlay-text {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .btn {
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .btn-green {
            background-color: #22c55e;
            color: white;
        }
        .btn-green:hover { background-color: #16a34a; }
        .btn-green:active { transform: scale(0.95); }
        .btn-yellow {
            background-color: #eab308;
            color: white;
        }
        .btn-yellow:hover { background-color: #ca8a04; }
        .btn-yellow:active { transform: scale(0.95); }
        .btn-red {
            background-color: #ef4444;
            color: white;
        }
        .btn-red:hover { background-color: #dc2626; }
        .btn-red:active { transform: scale(0.95); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .controls {
            display: flex;
            gap: 12px;
        }
        .controls .btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
        }
        .hint {
            text-align: center;
            color: #6b7280;
            font-size: 12px;
            margin-top: 16px;
        }
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 16px;
        }
        .mobile-controls .btn {
            background-color: #374151;
            color: white;
            padding: 16px;
            font-size: 20px;
        }
        .mobile-controls .btn:hover { background-color: #4b5563; }
        .mobile-controls .btn:active {
            background-color: #4b5563;
            transform: scale(0.95);
        }
        .game-over-pulse {
            animation: pulse 0.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .hidden { display: none; }

        @media (max-width: 768px) {
            .mobile-controls { display: grid; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">当前得分</div>
                <div id="score" class="score-value score-current">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">最高分</div>
                <div id="highScore" class="score-value score-high">0</div>
            </div>
        </div>

        <div class="game-container">
            <canvas id="gameCanvas"></canvas>
            <div id="overlay" class="overlay">
                <div class="overlay-content">
                    <div id="overlayText" class="overlay-text">点击开始游戏</div>
                    <button id="startOverlayBtn" class="btn btn-green">开始游戏</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn btn-green">开始</button>
            <button id="pauseBtn" class="btn btn-yellow" disabled>暂停</button>
            <button id="resetBtn" class="btn btn-red">重置</button>
        </div>

        <div class="hint">方向键 / WASD 控制 | 手机滑动控制</div>

        <div id="mobileControls" class="mobile-controls">
            <div></div>
            <button class="btn" data-dir="up">↑</button>
            <div></div>
            <button class="btn" data-dir="left">←</button>
            <button class="btn" data-dir="down">↓</button>
            <button class="btn" data-dir="right">→</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const overlayText = document.getElementById('overlayText');
        const startOverlayBtn = document.getElementById('startOverlayBtn');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const mobileControls = document.getElementById('mobileControls');

        const CELL_SIZE = 20;
        let COLS, ROWS;

        let snake, direction, nextDirection, food, score, gameLoop, isRunning, isPaused, isGameOver;
        let highScore = localStorage.getItem('snakeHighScore') || 0;

        highScoreEl.textContent = highScore;

        function resizeCanvas() {
            const container = canvas.parentElement;
            const width = container.clientWidth;
            COLS = Math.floor(width / CELL_SIZE);
            ROWS = Math.min(COLS, 20);
            canvas.width = COLS * CELL_SIZE;
            canvas.height = ROWS * CELL_SIZE;
        }

        function init() {
            snake = [{ x: 5, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            isRunning = false;
            isPaused = false;
            isGameOver = false;
            scoreEl.textContent = score;
            spawnFood();
            draw();
        }

        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
                validPosition = !snake.some(seg => seg.x === food.x && seg.y === food.y);
            }
        }

        function draw() {
            ctx.fillStyle = '#111827';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            snake.forEach((seg, i) => {
                ctx.fillStyle = i === 0 ? '#22c55e' : '#16a34a';
                if (typeof ctx.roundRect === 'function') {
                    ctx.beginPath();
                    ctx.roundRect(seg.x * CELL_SIZE + 1, seg.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2, 4);
                    ctx.fill();
                } else {
                    ctx.fillRect(seg.x * CELL_SIZE + 1, seg.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                }
            });

            ctx.fillStyle = '#facc15';
            if (typeof ctx.roundRect === 'function') {
                ctx.beginPath();
                ctx.roundRect(food.x * CELL_SIZE + 2, food.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4, 6);
                ctx.fill();
            } else {
                ctx.fillRect(food.x * CELL_SIZE + 2, food.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
            }
        }

        function update() {
            if (isPaused || isGameOver) return;

            direction = { ...nextDirection };

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }

            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            isGameOver = true;
            isRunning = false;
            clearInterval(gameLoop);
            overlay.classList.remove('hidden');
            overlayText.textContent = '游戏结束！得分：' + score;
            overlayText.classList.add('game-over-pulse');
            startOverlayBtn.textContent = '再来一局';
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.classList.remove('btn-green');
            pauseBtn.classList.add('btn-yellow');
            pauseBtn.textContent = '暂停';
        }

        function startGame() {
            if (isRunning) return;
            init();
            isRunning = true;
            overlay.classList.add('hidden');
            overlayText.classList.remove('game-over-pulse');
            gameLoop = setInterval(update, 120);
            startBtn.disabled = true;
            pauseBtn.disabled = false;
        }

        function pauseGame() {
            if (!isRunning || isGameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.textContent = '继续';
                pauseBtn.classList.remove('btn-yellow');
                pauseBtn.classList.add('btn-green');
            } else {
                pauseBtn.textContent = '暂停';
                pauseBtn.classList.remove('btn-green');
                pauseBtn.classList.add('btn-yellow');
            }
        }

        function resetGame() {
            clearInterval(gameLoop);
            isRunning = false;
            isPaused = false;
            isGameOver = false;
            init();
            overlay.classList.remove('hidden');
            overlayText.textContent = '点击开始游戏';
            overlayText.classList.remove('game-over-pulse');
            startOverlayBtn.textContent = '开始游戏';
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '暂停';
            pauseBtn.classList.remove('btn-green');
            pauseBtn.classList.add('btn-yellow');
        }

        function setDirection(newDir) {
            if (!isRunning || isPaused) return;
            const dirs = {
                up: { x: 0, y: -1 },
                down: { x: 0, y: 1 },
                left: { x: -1, y: 0 },
                right: { x: 1, y: 0 }
            };
            const d = dirs[newDir];
            if (d && !(d.x === -direction.x && d.y === -direction.y)) {
                nextDirection = d;
            }
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['arrowup', 'w'].includes(key)) { e.preventDefault(); setDirection('up'); }
            else if (['arrowdown', 's'].includes(key)) { e.preventDefault(); setDirection('down'); }
            else if (['arrowleft', 'a'].includes(key)) { e.preventDefault(); setDirection('left'); }
            else if (['arrowright', 'd'].includes(key)) { e.preventDefault(); setDirection('right'); }
        });

        let touchStartX, touchStartY;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                setDirection(dx > 0 ? 'right' : 'left');
            } else {
                setDirection(dy > 0 ? 'down' : 'up');
            }
            touchStartX = touchStartY = null;
        }, { passive: true });

        document.querySelectorAll('#mobileControls button').forEach(btn => {
            btn.addEventListener('click', () => setDirection(btn.dataset.dir));
        });

        function detectMobile() {
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768) {
                mobileControls.style.display = 'grid';
            }
        }

        startOverlayBtn.addEventListener('click', startGame);
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', pauseGame);
        resetBtn.addEventListener('click', resetGame);

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (!isRunning) draw();
        });

        resizeCanvas();
        detectMobile();
        init();
    </script>
</body>
</html>
