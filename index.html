<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - 排行榜版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        .container {
            max-width: 512px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
        }
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 28px;
            color: #22c55e;
            margin-bottom: 4px;
        }
        .header p {
            font-size: 12px;
            color: #9ca3af;
        }
        .game-card {
            background-color: #1f2937;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 16px;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #374151;
        }
        .score-item {
            flex: 1;
            text-align: center;
        }
        .score-label {
            color: #9ca3af;
            font-size: 11px;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .score-value {
            font-size: 24px;
            font-weight: bold;
        }
        .score-current { color: #22c55e; }
        .score-high { color: #facc15; }
        .score-speed { color: #60a5fa; }
        .speed-indicator {
            display: inline-block;
            background-color: #374151;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: normal;
        }
        .game-container {
            position: relative;
            margin-bottom: 16px;
            border-radius: 16px;
            overflow: hidden;
            background-color: #111827;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            touch-action: none;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(17, 24, 39, 0.95);
            border-radius: 16px;
        }
        .overlay-content {
            width: 90%;
            text-align: center;
        }
        .overlay-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #facc15;
        }
        .overlay-subtitle {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 20px;
        }
        .nickname-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #374151;
            border-radius: 12px;
            background-color: #111827;
            color: #ffffff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 12px;
        }
        .nickname-input:focus {
            border-color: #22c55e;
        }
        .nickname-input::placeholder {
            color: #6b7280;
        }
        .btn {
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            width: 100%;
        }
        .btn-green {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }
        .btn-green:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4); }
        .btn-green:active { transform: scale(0.98); }
        .btn-yellow {
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
            color: white;
        }
        .btn-yellow:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(234, 179, 8, 0.4); }
        .btn-yellow:active { transform: scale(0.98); }
        .btn-red {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        .btn-red:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4); }
        .btn-red:active { transform: scale(0.98); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .controls .btn {
            flex: 1;
            padding: 12px;
        }
        .hint {
            text-align: center;
            color: #6b7280;
            font-size: 11px;
            margin-bottom: 16px;
        }
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .mobile-controls .btn {
            background-color: #374151;
            color: white;
            padding: 16px;
            font-size: 20px;
        }
        .mobile-controls .btn:hover { background-color: #4b5563; }
        .mobile-controls .btn:active { transform: scale(0.95); }
        .leaderboard-card {
            background-color: #1f2937;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .leaderboard-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        .leaderboard-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #facc15 0%, #eab308 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }
        .leaderboard-icon svg {
            width: 18px;
            height: 18px;
            fill: #111827;
        }
        .leaderboard-title {
            font-size: 18px;
            font-weight: bold;
            color: #facc15;
        }
        .leaderboard-empty {
            text-align: center;
            color: #6b7280;
            padding: 20px;
            font-size: 14px;
        }
        .leaderboard-list {
            list-style: none;
        }
        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            background-color: #111827;
            transition: background-color 0.2s;
        }
        .leaderboard-item:hover {
            background-color: #374151;
        }
        .leaderboard-rank {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            margin-right: 12px;
        }
        .rank-1 { background: linear-gradient(135deg, #facc15 0%, #eab308 100%); color: #111827; }
        .rank-2 { background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%); color: white; }
        .rank-3 { background: linear-gradient(135deg, #d97706 0%, #b45309 100%); color: white; }
        .rank-other { background-color: #374151; color: #9ca3af; }
        .leaderboard-info {
            flex: 1;
            overflow: hidden;
        }
        .leaderboard-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .leaderboard-score {
            font-size: 16px;
            font-weight: bold;
            color: #22c55e;
        }
        .game-over-pulse {
            animation: pulse 0.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .hidden { display: none; }

        @media (max-width: 768px) {
            .mobile-controls { display: grid; }
            .header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 贪吃蛇</h1>
            <p>挑战最高分，登上排行榜！</p>
        </div>

        <div class="game-card">
            <div class="score-board">
                <div class="score-item">
                    <div class="score-label">得分</div>
                    <div id="score" class="score-value score-current">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">最高分</div>
                    <div id="highScore" class="score-value score-high">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">速度</div>
                    <div id="speed" class="score-value score-speed"><span class="speed-indicator">1x</span></div>
                </div>
            </div>

            <div class="game-container">
                <canvas id="gameCanvas"></canvas>
                <div id="overlay" class="overlay">
                    <div class="overlay-content" id="startScreen">
                        <div class="overlay-title">🐍 贪吃蛇</div>
                        <div class="overlay-subtitle">输入你的昵称开始游戏</div>
                        <input type="text" id="nicknameInput" class="nickname-input" placeholder="请输入昵称（1-10字）" maxlength="10">
                        <button id="startBtn" class="btn btn-green" disabled>开始游戏</button>
                    </div>
                    <div class="overlay-content hidden" id="gameOverScreen">
                        <div class="overlay-title game-over-pulse">游戏结束</div>
                        <div class="overlay-subtitle" id="finalScore"></div>
                        <button id="restartBtn" class="btn btn-green">再来一局</button>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="pauseBtn" class="btn btn-yellow" disabled>暂停</button>
                <button id="resetBtn" class="btn btn-red">重新开始</button>
            </div>

            <div class="hint">⌨️ 方向键/WASD控制 | 📱 触屏滑动/点击控制</div>

            <div id="mobileControls" class="mobile-controls">
                <div></div>
                <button class="btn" data-dir="up">↑</button>
                <div></div>
                <button class="btn" data-dir="left">←</button>
                <button class="btn" data-dir="down">↓</button>
                <button class="btn" data-dir="right">→</button>
            </div>
        </div>

        <div class="leaderboard-card">
            <div class="leaderboard-header">
                <div class="leaderboard-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 8v4l3 3"/>
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                </div>
                <div class="leaderboard-title">排行榜 TOP 10</div>
            </div>
            <ul id="leaderboard" class="leaderboard-list"></ul>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const speedEl = document.getElementById('speed');
        const overlay = document.getElementById('overlay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const nicknameInput = document.getElementById('nicknameInput');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScoreEl = document.getElementById('finalScore');
        const leaderboard = document.getElementById('leaderboard');
        const mobileControls = document.getElementById('mobileControls');

        const CELL_SIZE = 20;
        let COLS, ROWS;

        let snake, direction, nextDirection, food, score, gameLoop, isRunning, isPaused, isGameOver;
        let currentNickname = '';
        let baseSpeed = 120;
        let currentSpeed = baseSpeed;
        let speedLevel = 1;

        const SPEED_INCREMENT = 50;
        const SPEED_MULTIPLIER = 0.9;
        const MAX_SPEED_LEVEL = 10;

        function getLeaderboard() {
            const data = localStorage.getItem('snakeLeaderboard');
            return data ? JSON.parse(data) : [];
        }

        function saveScore(nickname, score) {
            const leaderboard = getLeaderboard();
            const existingIndex = leaderboard.findIndex(entry => entry.nickname === nickname);
            
            if (existingIndex >= 0) {
                if (score > leaderboard[existingIndex].score) {
                    leaderboard[existingIndex].score = score;
                    leaderboard[existingIndex].date = new Date().toISOString();
                }
            } else {
                leaderboard.push({
                    nickname: nickname,
                    score: score,
                    date: new Date().toISOString()
                });
            }
            
            leaderboard.sort((a, b) => b.score - a.score);
            const top10 = leaderboard.slice(0, 10);
            localStorage.setItem('snakeLeaderboard', JSON.stringify(top10));
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const data = getLeaderboard();
            if (data.length === 0) {
                leaderboard.innerHTML = '<li class="leaderboard-empty">暂无记录，快来挑战吧！</li>';
                return;
            }
            
            leaderboard.innerHTML = data.map((entry, index) => `
                <li class="leaderboard-item">
                    <div class="leaderboard-rank rank-${index < 3 ? index + 1 : 'other'}">${index + 1}</div>
                    <div class="leaderboard-info">
                        <div class="leaderboard-name">${entry.nickname}</div>
                    </div>
                    <div class="leaderboard-score">${entry.score}</div>
                </li>
            `).join('');
        }

        function getPersonalBest(nickname) {
            const leaderboard = getLeaderboard();
            const entry = leaderboard.find(e => e.nickname === nickname);
            return entry ? entry.score : 0;
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            const width = container.clientWidth;
            COLS = Math.floor(width / CELL_SIZE);
            ROWS = Math.min(COLS, 20);
            canvas.width = COLS * CELL_SIZE;
            canvas.height = ROWS * CELL_SIZE;
        }

        function init() {
            snake = [{ x: Math.floor(COLS / 4), y: Math.floor(ROWS / 2) }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speedLevel = 1;
            currentSpeed = baseSpeed;
            isRunning = false;
            isPaused = false;
            isGameOver = false;
            scoreEl.textContent = score;
            speedEl.innerHTML = `<span class="speed-indicator">${speedLevel}x</span>`;
            highScoreEl.textContent = getPersonalBest(currentNickname);
            spawnFood();
            draw();
        }

        function spawnFood() {
            let validPosition = false;
            let attempts = 0;
            while (!validPosition && attempts < 100) {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
                validPosition = !snake.some(seg => seg.x === food.x && seg.y === food.y);
                attempts++;
            }
        }

        function draw() {
            ctx.fillStyle = '#111827';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            snake.forEach((seg, i) => {
                const gradient = ctx.createLinearGradient(
                    seg.x * CELL_SIZE, seg.y * CELL_SIZE,
                    (seg.x + 1) * CELL_SIZE, (seg.y + 1) * CELL_SIZE
                );
                if (i === 0) {
                    gradient.addColorStop(0, '#22c55e');
                    gradient.addColorStop(1, '#16a34a');
                } else {
                    const alpha = 1 - (i / snake.length) * 0.4;
                    gradient.addColorStop(0, `rgba(34, 197, 94, ${alpha})`);
                    gradient.addColorStop(1, `rgba(22, 163, 74, ${alpha})`);
                }
                ctx.fillStyle = gradient;
                if (typeof ctx.roundRect === 'function') {
                    ctx.beginPath();
                    ctx.roundRect(seg.x * CELL_SIZE + 1, seg.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2, 4);
                    ctx.fill();
                } else {
                    ctx.fillRect(seg.x * CELL_SIZE + 1, seg.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                }
            });

            const foodGradient = ctx.createRadialGradient(
                food.x * CELL_SIZE + CELL_SIZE / 2, food.y * CELL_SIZE + CELL_SIZE / 2, 0,
                food.x * CELL_SIZE + CELL_SIZE / 2, food.y * CELL_SIZE + CELL_SIZE / 2, CELL_SIZE / 2
            );
            foodGradient.addColorStop(0, '#fef08a');
            foodGradient.addColorStop(1, '#facc15');
            ctx.fillStyle = foodGradient;
            if (typeof ctx.roundRect === 'function') {
                ctx.beginPath();
                ctx.roundRect(food.x * CELL_SIZE + 2, food.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4, 6);
                ctx.fill();
            } else {
                ctx.fillRect(food.x * CELL_SIZE + 2, food.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
            }
        }

        function update() {
            if (isPaused || isGameOver) return;

            direction = { ...nextDirection };

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }

            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                
                const newSpeedLevel = Math.min(Math.floor(score / SPEED_INCREMENT) + 1, MAX_SPEED_LEVEL);
                if (newSpeedLevel > speedLevel) {
                    speedLevel = newSpeedLevel;
                    currentSpeed = Math.max(baseSpeed * Math.pow(SPEED_MULTIPLIER, speedLevel - 1), 50);
                    speedEl.innerHTML = `<span class="speed-indicator">${speedLevel}x</span>`;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, currentSpeed);
                }
                
                if (score > parseInt(highScoreEl.textContent)) {
                    highScoreEl.textContent = score;
                }
                
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            isGameOver = true;
            isRunning = false;
            clearInterval(gameLoop);
            
            saveScore(currentNickname, score);
            
            finalScoreEl.textContent = `得分: ${score} | 速度等级: ${speedLevel}x`;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            pauseBtn.disabled = true;
            pauseBtn.textContent = '暂停';
        }

        function startGame() {
            currentNickname = nicknameInput.value.trim() || '匿名玩家';
            init();
            isRunning = true;
            overlay.classList.add('hidden');
            startScreen.classList.remove('hidden');
            gameOverScreen.classList.add('hidden');
            gameLoop = setInterval(update, currentSpeed);
            pauseBtn.disabled = false;
        }

        function pauseGame() {
            if (!isRunning || isGameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.textContent = '继续';
                pauseBtn.classList.remove('btn-yellow');
                pauseBtn.classList.add('btn-green');
            } else {
                pauseBtn.textContent = '暂停';
                pauseBtn.classList.remove('btn-green');
                pauseBtn.classList.add('btn-yellow');
            }
        }

        function resetGame() {
            clearInterval(gameLoop);
            overlay.classList.remove('hidden');
            startScreen.classList.remove('hidden');
            gameOverScreen.classList.add('hidden');
            pauseBtn.disabled = true;
            pauseBtn.textContent = '暂停';
            pauseBtn.classList.remove('btn-green');
            pauseBtn.classList.add('btn-yellow');
            nicknameInput.value = '';
            startBtn.disabled = true;
        }

        function setDirection(newDir) {
            if (!isRunning || isPaused) return;
            const dirs = {
                up: { x: 0, y: -1 },
                down: { x: 0, y: 1 },
                left: { x: -1, y: 0 },
                right: { x: 1, y: 0 }
            };
            const d = dirs[newDir];
            if (d && !(d.x === -direction.x && d.y === -direction.y)) {
                nextDirection = d;
            }
        }

        nicknameInput.addEventListener('input', () => {
            startBtn.disabled = nicknameInput.value.trim().length === 0;
        });

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['arrowup', 'w'].includes(key)) { e.preventDefault(); setDirection('up'); }
            else if (['arrowdown', 's'].includes(key)) { e.preventDefault(); setDirection('down'); }
            else if (['arrowleft', 'a'].includes(key)) { e.preventDefault(); setDirection('left'); }
            else if (['arrowright', 'd'].includes(key)) { e.preventDefault(); setDirection('right'); }
        });

        let touchStartX, touchStartY;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const minSwipe = 30;
            if (Math.abs(dx) > minSwipe || Math.abs(dy) > minSwipe) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    setDirection(dx > 0 ? 'right' : 'left');
                } else {
                    setDirection(dy > 0 ? 'down' : 'up');
                }
            }
            touchStartX = touchStartY = null;
        }, { passive: true });

        document.querySelectorAll('#mobileControls button').forEach(btn => {
            btn.addEventListener('click', () => setDirection(btn.dataset.dir));
        });

        function detectMobile() {
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768) {
                mobileControls.style.display = 'grid';
            }
        }

        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', pauseGame);
        resetBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('click', () => {
            overlay.classList.add('hidden');
            resetGame();
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (!isRunning) draw();
        });

        resizeCanvas();
        detectMobile();
        renderLeaderboard();
        init();
    </script>
</body>
</html>
